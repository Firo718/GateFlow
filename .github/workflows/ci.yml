name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Layer 1: Fast sanity checks for every push/PR.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install basic tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      
      - name: Verify package builds
        run: python -m build

      - name: Verify Python sources compile
        run: python -m compileall src tests

  # Layer 2: Linux unit tests (Vivado-independent).
  test-linux:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests (excluding Vivado tests)
        run: pytest tests/ -v --tb=short -m "not vivado" --cov=src/gateflow --cov-report=xml --cov-report=term-missing

  # Layer 2: Windows unit tests (Vivado-independent).
  test-windows:
    runs-on: windows-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests (excluding Vivado tests)
        run: pytest tests/ -v --tb=short -m "not vivado" --cov=src/gateflow --cov-report=xml --cov-report=term-missing

  # Optional Vivado verification. Keep it manual/self-hosted so public CI stays actionable.
  test-vivado:
    runs-on: self-hosted
    needs: [test-linux, test-windows]
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run all tests (including Vivado tests)
        run: pytest tests/ -v --tb=short --cov=src/gateflow --cov-report=xml --cov-report=term-missing

  # Build artifacts from the validated non-Vivado matrix.
  build:
    runs-on: ubuntu-latest
    needs: [test-linux, test-windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Build package
        run: |
          pip install build
          python -m build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
