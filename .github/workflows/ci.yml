name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Layer 1: 代码风格和类型检查
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      
      - name: Run ruff check
        run: ruff check src/
      
      - name: Run mypy type checking
        run: mypy src/gateflow

  # Layer 2: Linux 单元测试（不需要 Vivado）
  test-linux:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests (excluding Vivado tests)
        run: pytest tests/ -v --tb=short -m "not vivado" --cov=src/gateflow --cov-report=xml --cov-report=term-missing

  # Layer 2: Windows 单元测试（不需要 Vivado）
  test-windows:
    runs-on: windows-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests (excluding Vivado tests)
        run: pytest tests/ -v --tb=short -m "not vivado" --cov=src/gateflow --cov-report=xml --cov-report=term-missing

  # Layer 3: 需要 Vivado 的集成测试（仅在 main 分支运行）
  test-vivado:
    runs-on: self-hosted
    needs: [test-linux, test-windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run all tests (including Vivado tests)
        run: pytest tests/ -v --tb=short --cov=src/gateflow --cov-report=xml --cov-report=term-missing

  # 构建和发布
  build:
    runs-on: ubuntu-latest
    needs: [test-linux, test-windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Build package
        run: |
          pip install build
          python -m build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
